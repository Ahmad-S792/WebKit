<!DOCTYPE html>
<html>
<head>
    <style>
        /* Multiple negative z-index children in a stacking context should all
           appear in front of an external composited layer with lower stacking order. */
        .stacking-context {
            position: relative;
            z-index: 1;
        }

        .neg-child {
            position: absolute;
            left: 0;
            background-color: green;
        }

        .neg-1 {
            z-index: -1;
            top: 30px;
            width: 300px;
            height: 50px;
        }

        .neg-2 {
            z-index: -2;
            top: 90px;
            width: 300px;
            height: 50px;
        }

        .neg-3 {
            z-index: -3;
            top: 150px;
            width: 300px;
            height: 50px;
        }

        .composited {
            position: absolute;
            top: 20px;
            left: 0;
            transform: translateZ(0);
            height: 300px;
            width: 300px;
            background-color: red;
        }
    </style>
</head>
<body>
    <p>There should be no red visible.</p>
    <div class="stacking-context">
        <div class="neg-child neg-1"></div>
        <div class="neg-child neg-2"></div>
        <div class="neg-child neg-3"></div>
    </div>
    <div class="composited"></div>
</body>
</html>
