<!DOCTYPE html>
<html>
<head>
    <style>
        /* A stacking context with z-index: 1 containing a negative z-index child.
           The negative z-index child should still appear in front of a composited
           sibling with z-index: auto (0), because it's inside the z-index: 1 context. */
        header {
            position: relative;
            z-index: 1;
        }

        .header-search {
            position: absolute;
            z-index: -1;
            width: 100%;
            height: 140px;
            background-color: green;
        }

        .composited {
            position: absolute;
            top: 20px;
            left: 0;
            transform: translateZ(0);
            height: 400px;
            width: 400px;
            background-color: red;
        }
    </style>
</head>
<body>
    <!-- The green box is z-index: -1 inside a z-index: 1 stacking context, so it
         should paint in front of the red composited box (z-index: auto/0). -->
    <p>There should be no red visible.</p>
    <header>
        <div class="header-search"></div>
    </header>
    <div class="composited"></div>
</body>
</html>
