<!DOCTYPE html>
<html>
<head>
    <style>
        /* Non-regression test: a negative z-index child inside a stacking context
           that overlaps a composited sibling with lower z-index should trigger
           compositing of the stacking context (BackgroundLayer reason), but a
           negative z-index child that does NOT overlap should not cause unnecessary
           compositing. This test has both cases. */
        .parent {
            position: relative;
            z-index: 1;
        }

        .neg-overlapping {
            position: absolute;
            z-index: -1;
            top: 20px;
            left: 0;
            width: 200px;
            height: 100px;
            background-color: green;
        }

        .neg-non-overlapping {
            position: absolute;
            z-index: -1;
            top: 500px;
            left: 0;
            width: 200px;
            height: 50px;
            background-color: blue;
        }

        .composited {
            position: absolute;
            top: 20px;
            left: 0;
            transform: translateZ(0);
            height: 200px;
            width: 200px;
            background-color: red;
        }

        .later-sibling {
            position: relative;
            z-index: 2;
            width: 50px;
            height: 50px;
            margin-top: 600px;
            background-color: purple;
        }
    </style>
</head>
<body>
    <!-- The green box overlaps the red composited box and is inside a z-index: 1
         stacking context, so it should appear in front (no red visible in that area).
         The blue box does not overlap anything composited, so it should not trigger
         unnecessary compositing. The purple later-sibling should not be composited
         unnecessarily due to negative z-index children. -->
    <p>The green box should cover the red box. No red should be visible.</p>
    <div class="parent">
        <div class="neg-overlapping"></div>
        <div class="neg-non-overlapping"></div>
    </div>
    <div class="composited"></div>
    <div class="later-sibling"></div>
</body>
</html>
