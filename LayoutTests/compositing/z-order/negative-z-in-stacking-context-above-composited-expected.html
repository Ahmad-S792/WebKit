<!DOCTYPE html>
<html>
<head>
    <style>
        header {
            position: relative;
            z-index: 1;
        }

        .header-search {
            position: absolute;
            z-index: -1;
            width: 100%;
            height: 140px;
            background-color: green;
        }

        .behind {
            position: absolute;
            top: 20px;
            left: 0;
            height: 400px;
            width: 400px;
            background-color: red;
        }
    </style>
</head>
<body>
    <p>There should be no red visible.</p>
    <header>
        <div class="header-search"></div>
    </header>
    <div class="behind"></div>
</body>
</html>
